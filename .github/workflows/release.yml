name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest # arm64
    env:
      HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: '0.15.2'

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.20.0-rc.4'
          otp-version: '28'

      - name: Build CLI
        run: |
          cd cli
          zig build-exe src/main.zig -target aarch64-macos.15.0-none -OReleaseSafe
          mv main explicit

      - name: Build server release
        run: |
          cd server
          mix deps.get --only prod
          MIX_ENV=prod mix release explicit_server --overwrite

      - name: Create distribution tarball
        id: dist
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          ARTIFACT="explicit-${TAG}-macos-arm64.tar.gz"
          mkdir -p dist/bin dist/lib

          # CLI binary
          cp cli/explicit dist/bin/

          # Server release
          tar xzf server/_build/prod/explicit_server-*.tar.gz -C dist/lib/

          # Wrapper script for server
          cat > dist/bin/explicit-server << 'WRAPPER'
          #!/bin/bash
          SCRIPT_DIR="$(cd "$(dirname "$0")" && pwd)"
          export RELEASE_ROOT="${SCRIPT_DIR}/../lib"
          exec "${SCRIPT_DIR}/../lib/bin/explicit_server" "$@"
          WRAPPER
          chmod +x dist/bin/explicit-server

          # Create tarball
          cd dist
          tar czf "../${ARTIFACT}" .
          cd ..

          SHA256=$(shasum -a 256 "${ARTIFACT}" | awk '{print $1}')
          echo "artifact=${ARTIFACT}" >> "$GITHUB_OUTPUT"
          echo "sha256=${SHA256}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.dist.outputs.artifact }}
          generate_release_notes: true

      - name: Check out Homebrew tap
        if: ${{ env.HOMEBREW_TAP_GITHUB_TOKEN != '' }}
        uses: actions/checkout@v4
        with:
          repository: explicit-sh/homebrew-tap
          token: ${{ env.HOMEBREW_TAP_GITHUB_TOKEN }}
          path: homebrew-tap

      - name: Update Homebrew formula
        if: ${{ env.HOMEBREW_TAP_GITHUB_TOKEN != '' }}
        run: |
          ./scripts/render-homebrew-formula.sh \
            "${{ steps.dist.outputs.version }}" \
            "${{ steps.dist.outputs.sha256 }}" \
            > homebrew-tap/Formula/explicit.rb

      - name: Commit Homebrew formula update
        if: ${{ env.HOMEBREW_TAP_GITHUB_TOKEN != '' }}
        run: |
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet -- Formula/explicit.rb; then
            echo "Formula already up to date"
            exit 0
          fi

          git add Formula/explicit.rb
          git commit -m "explicit ${{ steps.dist.outputs.version }}"
          git push
